phenotype_synopsis: Homozygous plants were retarded in growth relative to normal plants, whereas heterozygous plants did not show dwarfism. Homozygous plants could flower and produce a few pods. The seeds did not show visible morphological changes but took an unusually long time to germinate (at least 3 weeks). Roots in homozygous lines were very short and less branched compared with the wild type.
