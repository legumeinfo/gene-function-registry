comments:
  - NPF7.6 expression is specifically localized to nodule vasculature transfer
    cells, where it is induced by both rhizobial infection and high external
    nitrate.
  - NPF7.6 encodes a high‑affinity nitrate transporter with a Michaelis constant
    of around 150 μM, enabling efficient nitrate uptake across a wide
    concentration range.
  - NPF7.6 knockout phenotypes show that loss of NPF7.6 disrupts nodule
    vasculature development, producing abnormal wall ingrowths with plasma
    membranes that had exaggerated jagged margins.
  - NPF7.6 nitrate responsiveness is essential for proper nitrate‑mediated
    regulation of nodulation, as npf7.6 mutants show severely reduced
    responsiveness to both low and high nitrate.
  - NPF7.6 impact on nitrogen fixation affects nitrogenase activity by altering
    leghaemoglobin expression and nitric oxide homeostasis, leading to
    dramatically reduced nitrogen fixation.
phenotype_synopsis: NPF7.6 is a high‑affinity nitrate transporter in Medicago
  truncatula whose loss causes severely reduced nitrate uptake and
  defective/abnormally shaped cell walls within root nodules, producing nodules
  that fail to properly respond to either low or high external nitrate.
