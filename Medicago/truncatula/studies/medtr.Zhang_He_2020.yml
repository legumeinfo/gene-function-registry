comments:
  - DIB1 encodes a gibberellin 3β‑hydroxylase (GA3ox) enzyme, catalysing the
    final step of the biosynthetic pathway for bioactive gibberellins.
  - Loss of DIB1 causes extreme dwarfism due to reduced cell elongation. Cells
    in the dib1-1 mutant were ~28% the length of wild type cells. The total
    epidermal cell number as internode length/epidermal cell length was also
    calculated, showing the number of cells in the dib1-1 mutant was ~58% that
    of the wild type.
  - DIB1 mutants have reduced Gibberellin 1 and Gibberellin 4 levels. The
    concentration of Gibberellin 1 was slightly lower in the dib1-1 mutant
    whilst Gibberellin 4 was only 27% of wild type levels. However, applying
    Gibberellin 3 rescues the dwarf phenotype, indicating that DIB1 is necessary
    for gibberellin biosynthesis in Medicago truncatula.
  - DIB1 also suppresses excessive branching by maintaining gibberellin levels.
    Low gibberellins in the mutant releases axillary buds, causing extreme
    dwarfism and increased numbers of lateral branches.
  - DIB1 was responsible for the last step in the synthesis of bioactive
    gibberellins and it was detected in elongating organs and seeds.
phenotype_synopsis: DIB1 mutants exhibit extreme dwarfism due to severely
  reduced cell elongation, resulting in very short internodes and increased
  lateral branching caused by low gibberellin levels.
