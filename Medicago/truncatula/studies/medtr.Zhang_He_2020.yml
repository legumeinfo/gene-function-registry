confidence: 3
curators:
  - Molly Hardacre
  - Scott Kalberer
comments:
  - Both the MtGA3ox2 and DIB1 (MtGA3ox1) genes encode GA3ox enzymes, but DIB1
    is the primary gene responsible for shoot elongation.
  - Analysis showed that MtGA3ox2 had a different pattern of expression compared
    with DIB1. First, the expression of MtGA3ox2 was higher in all the organs
    examined. Second, MtGA3ox2 transcripts were more abundant in seeds at 10 and
    30 days after pollination than at 20 days after pollination, with the
    highest expression being observed at 10 days after pollination.
  - It is possible that MtGA3ox2 might still have a function in the last step of
    the biosynthesis of bioactive gibberellins in Medicago truncatula, as
    MtGA3ox2 mRNA was highly accumulated in most of the tissues. This implies
    that MtGA3ox2 might also catalyse inactive gibberellins into bioactive
    gibberellins in the last step of biosynthesis in the dib1 mutant.
phenotype_synopsis: MtGA3ox2 mutants do not show dwarfism or shoot growth
  defects, it likely functions in other tissues or developmental stages such as
  roots and seeds.
