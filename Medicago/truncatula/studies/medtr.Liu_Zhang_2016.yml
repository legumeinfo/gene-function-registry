comments:
  - MtWRKY76 expression is rapidly induced by abiotic stresses such as salt,
    drought, and abscisic acid treatment, but not significantly by cold stress
  - Overexpression of MtWRKY76 in transgenic Medicago truncatula enhances both
    salt and drought tolerance, improving root growth, survival rate, and
    activating abiotic stress-responsive genes
  - Transcriptome analysis by digital gene expression reveals that MtWRKY76
    overexpression significantly alters the expression of numerous
    stress-related genes including transcription factors and F-box proteins,
    suggesting a multifaceted role in abiotic stress response
  - MtWRKY76 is localized in the nucleus and physically interacts with
    Medtr1g098680.1, a protein homologous to abscisic acid-, stress-, and
    ripening-induced proteins, forming a transcription-regulating complex
    involved in abiotic stress pathways
phenotype_synopsis: Overexpression of MtWRKY76 enhances salt and drought
  tolerance in Medicago truncatula, improving plant survival and growth under
  these abiotic stresses
