comments:
  - MsHSP70 shares high sequence identity (94.47%) with HSP70 from Medicago
    truncatula.
  - Expression analysis of MsHSP70 in alfalfa organs revealed a relatively
    higher expression level in aerial organs such as flowers, stems and leaves
    than in roots.
  - Observations of transgenic Arabidopsis under stress suggested that the
    enhanced stress tolerance of the transgenic seedlings primarily resulted
    from the elevation of MsHSP70 levels.
  - Higher relative water content was detected in transgenic MsHSP70 plants
    compared with non-transgenic plants under drought stress.
  - Because the original study was conducted before the release of the Medicago
    sativa XinJiangDaYe genome assembly (2020), the gene we targeted did not yet
    have a single standardized locus identifier. As a result, our BLAST search
    returned four separate hit IDs, each showing 92% sequence identity. The
    presence of four equally strong BLAST matches is consistent with the biology
    of polyploid alfalfa and reflects the fact that the gene is expected to
    appear in multiple homeologous copies rather than a single unique locus.
phenotype_synopsis: MsHSP70 may play a protective role under drought and
  abscisic acid stress, but not salt stress, in a respiratory metabolism related
  way.
