comments:
  - The homeotic knotted-1-like gene LOC101500499 functions as an active
    regulator of leaf development in chickpea, controlling the transition
    between compound and simple leaf morphology
  - A single-base deletion mutation within the open reading frame of this gene
    leads to a frameshift and premature stop codon, directly associated with the
    simple-leaf phenotype
  - Phylogenetic analysis places this gene in the M subclass of KNOX genes,
    which lack the ELK and homeobox domains but retain the KNOX1 and KNOX2
    domains necessary for DNA binding and protein interactions
  - The development of a KASP marker targeting the mutation in this homeotic
    knotted-1-like gene enabled accurate genotyping and explained 90% of leaf
    type variation
  - Transcript levels of the homeotic knotted-1-like gene are significantly
    reduced in simple-leaf genotypes, supporting its functional role in compound
    leaf formation
phenotype_synopsis: The homeotic knotted-1-like gene in chickpea controls leaf
  morphology so that a single-nucleotide deletion causes a loss of function
  leading to a simple-leaf phenotype, while its normal expression creates a
  plant with the typical compound leaf form
