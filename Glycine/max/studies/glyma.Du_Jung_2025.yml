comments:
  - Overexpression of Rhg1-GmAAT in soybean roots enhanced the accumulation of
    betalain synthesized by three RUBY ezymes (RUBY is an artificial gene
    cassette that drives the production of betalain pigments derived from the
    aromatic amino acid precursor tyrosine, resulting in a distinct red
    coloration in plant tissues where it is expressed) and it can also influence
    amino acid homeostasis in soybean roots
  - Co-overexpression of Rhg1-GmAAT and GmRBOHG (encoding an AATRhg1interacting
    NADPH oxidase) blocked the betalain phenotype, indicating a complex role of
    AATRhg1
  - Silencing Rhg1-GmAAT also led to increased betalain accumulation. This might
    be attributable to the impact of AATRhg1 on subcellular tyrosine balance and
    feedback regulation of tyrosine synthesis.
  - AATRhg1 may play a role in exporting tyrosine from vacuolar storage and
    potentially increase cytosolic tyrosine availability for betalain synthesis
    when RUBY is expressed
  - Expression of Rhg1-GmAAT proteins with mutations at conserved residues D122A
    or Y268L mitigated or enhanced the betalain phenotypes, respectively,
    suggesting that these residues are important for Rhg1-GmAAT function
  - The Arabidopsis ortholog of Rhg1-GmAAT is AtAVT6C (AT3G56200)
phenotype_synopsis: Rhg1-GmAAT that is essential for Soybean cyst nematode
  resistance but also introduces a novel strategy for enhancing betalain pigment
  production
