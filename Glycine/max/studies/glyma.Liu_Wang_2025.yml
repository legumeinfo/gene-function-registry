comments:
  - Five loci (I, T, W1, R, and O) synergistically influence flavonoid
    deposition in the soybean hilum, impacting seed coat color, nutritional, and
    physiological traits (Yang, Jeong et al., 2010).
  - The pleiotropic T gene encodes flavonoid 3'-hydroxylase (F3'H), which
    affects testa and hilum color, pubescence color, cold stress tolerance, seed
    yield, and growth habits and development. F3'H affects chilling resilience
    by producing more 30,40-dihydroxylated flavonol derivatives which then
    enhance antioxidant activity (Toda, Takahashi et al., 2011; Toda, Yang et
    al., 2002).
  - The soybean sf3′h1 gene, 1690 nucleotides and 513 amino acids in length,
    corresponds to the T locus that encodes the F3'H enzyme and was mapped to
    the same location on LG3(c2) using RFLPs. The functional dominant T allele
    leads to brown pubescence. A single-base cytosine deletion in the recessive
    allele produces a shifted reading frame that is missing the GGEK consensus
    sequence and heme-binding domain. The resulting truncated polypeptide is
    associated with gray pubescence, altered flavonoid content, and longer
    PCR-RFLP fragments (Toda, Yang et al., 2002).
  - Complete sf3'h1 protein shows up strongest in the hilum and funiculus of
    immature seed coats in homozygous dominant plants. Homozygous recessive
    plants have a truncated protein that's harder to detect. F3'H enzyme
    activity in transformed yeast fractions was measured for dominant but not
    recessive sf3'h1 alleles. Scavenging activity of the DPPH radical in
    funiculus and hilum extracts was higher in dominant than in recessive
    plants. F3'H is connected to flavonoid biosynthesis in the testa and the
    antioxidant properties manifested therein (Toda, Kuroiwa et al., 2012).
  - The location of cytochrome P450 monooxygenase F3'H was pinpointed using
    microscopy to the tonoplast surrounding vacuoles within the seed coat
    hilum’s parenchymatic cells (Toda, Kuroiwa et al., 2012).
  - A soybean GWAS using SNPs proposed seven candidate genes for stem pubescence
    color and four candidates for hilum color based on transcription patterns,
    cold stress responses, and regulatory pathways. Glyma.06G202300 was found
    near two SNPs (Chr06:18749716 and Chr06:18749528) and is an orthologue of
    Arabidopsis AT5G07990; it represents a candidate for both characters that
    encodes flavonoid 3′-hydroxylase. Glyma.06G202300 was highly expressed
    primarily in the seeds, secondarily in pods, and also in stems and the shoot
    apical meristem (Zhou, Wang et al.,2024).
  - Soybean plants exhibited canopy leaf pigmentation changes (CLPC), a
    reddish-purple coloration, that correlated with abiotic stress responses
    such as decreased Fv/Fm numbers for photosystem II and hyperspectral
    reflectance. Reflectance wavelengths in the peak range for anthocyanins
    differed between reddish-purple and green leaves; nonetheless, anthocyanin
    accumulation wasn't detected in pigmented leaves by liquid chromatography
    (You, Jo et al., 2024).
  - A major QTL on chromosome 6 between 17.9 and 18.9 Mbp, encompassing
    Glyma.06G202300, explains a significant portion of phenotypic variance in
    canopy leaf pigmentation. Glyma.06G202300 gene expression was 2.5- to
    7.2-fold higher in pigmented than in green leaves of the same plants. The
    gene encodes a Flavonoid 3'-Hydroxylase involved in anthocyanin biosynthesis
    (You, Jo et al., 2024).
  - Purple-leaved plants have a single-base deletion in Glyma.06G202300,
    localized to 18,737,369 BP in the third exon. The consequence of this
    frameshift mutation is a premature stop codon and is expressed as a
    truncated protein missing functional domains (You, Jo et al., 2024).
  - Hilum color (black or brown) is controlled by a single dominant gene, Hilum
    Colour 1 (HC1), mapped to a 34-kb region on chromosome 6 containing the open
    reading frame Glyma.06G202300. Sequencing of Glyma.06G202300 revealed a
    single-base deletion in exon 3 present for the brown-hilum soybean, which
    resulted in a frameshift mutation with premature termination and deletion of
    the functional domain (Liu, Wang et al., 2025).
  - HC1, an orthologue of Arabidopsis TT7, encodes for flavonoid 3′-hydroxylase
    (F3′H). F3′H converts apigenin or kaempferol substrates to luteolin and
    quercetin, respectively. HC1 is localized to the endoplasmic reticulum and
    may be involved in flavonoid biosynthesis there. HC1 is constitutively
    expressed in soybean and to a particularly high degree in early‑ to
    mid‑developing seeds (Liu, Wang et al., 2025).
  - Knockout of HC1 validated the HC1 candidate gene and its role in seed hilum
    developement. HC1 knockout resulted in lighter hilum colour, suppression of
    downstream production of dihydroquercetin and quercetin, and smaller hilum
    sizes relative to wild type. HC1 overexpression lines exhibited a hilum
    color shift from light brown to gray (Liu, Wang et al., 2025).
  - The hc1 alleles are prevalent in cultivated soybeans, especially in northern
    China, suggesting domestication-driven selection for lighter hilums or
    linked traits like maturity; hc1 knockout lines exhibit reduced seed oil,
    nodule formation, and photosynthetic efficiency (Liu, Wang et al., 2025).
  - HC1 influences nodulation, nitrogen fixation, and seed development, with
    functional HC1 promoting higher antioxidant activity, seed oil accumulation,
    and beneficial symbiotic interactions, suggesting a regulatory role in
    flavonoid metabolism and plant productivity (Liu, Wang et al., 2025).
phenotype_synopsis: Glyma.06G202300 encodes a Flavonoid 3′-Hydroxylase (F3′H)
  and is associated with canopy leaf pigmentation and abiotic stress resistance
  (You, Jo et al., 2024). The pleiotropic effects of HC1 in soybeans include
  regulation of hilum development, seed oil content, and nodulation (Liu, Wang
  et al., 2025).
