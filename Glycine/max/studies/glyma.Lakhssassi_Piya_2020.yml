comments:
  - GmSNAP18, GmSHMT08, and GmPR08-Bet VI, were found to localize in the cytosol
    and plasma membrane
  - Overexpression of GmPR08-Bet VI did not have an effect on soybean cyst
    nematode resistance when the two cytokinin-binding sites in GmPR08-Bet VI
    were mutated, indicating a new role of GmPR08-Bet VI in SCN resistance
  - GmSNAP18 and GmPR08-Bet VI induced under salicylic acid and cytokinin
    treatments, while GmSHMT08 was induced only when the resistant GmSNAP18 was
    present, pointing to the presence of a molecular crosstalk between soybean
    cyst nematode resistant genes
