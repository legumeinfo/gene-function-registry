comments:
  - GmMYB14-overexpressing transgenic soybean plants displayed a semi-dwarfism
    and compact plant architecture associated with decreased cell size,
    resulting in a decrease in plant height, internode length, leaf area, leaf
    petiole length and leaf petiole angle, and improved yield in high density
    under field conditions.
  - GmMYB14-overexpressing plants showed reduced endogenous brassinosteroid
    contents, while exogenous application of brassinolide could partly rescue
    the phenotype of GmMYB14-overexpressing plants.
  - GmMYB14 was shown to directly bind to the promoter of GmBEN1 and up-regulate
    its expression, leading to reduced brassinosteroid content in
    GmMYB14-overexpression plants.
  - GmBEN1 expression was also upregulated in the leaves of
    GmMYB14-overexpression plants, indicating that the GmBEN1-mediated reduction
    in brassinosteroid level under stress also contributed to drought/osmotic
    stress tolerance of the transgenic plants.
  - GmMYB14 was shown to localize to nucleus and has a transactivation activity
phenotype_synopsis: GmMYB14 improves high-density yield and drought tolerance of soybean
