comments:
  - Experiments conducted over two seasons reveal increased yields per plant in
    both GmNF-YC9 and GmSQE1 overexpressing plants under drought stress
    conditions
  - Unlike any other GmNF-YC genes, the GmNF-YC9-mediated NF-Y transcription
    complex directly regulates the expression of GmSQE1 under stress conditions
  - GmNF-YC9 could form a NF-Y transcriptional complex with GmNF-YA2 and
    GmNF-YB24 through protein–protein interactions to directly activate
    expression of the key enzyme involved in phytosterol synthesis pathway
    (GmSQE1), thereby promoting sterol synthesis to improve soybean stress
    tolerance
phenotype_synopsis: Overexpression of either GmNF-YC9 or GmSQE1 significantly
