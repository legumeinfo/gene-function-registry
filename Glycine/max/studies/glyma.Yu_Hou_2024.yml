confidence: 3
curators:
  - Molly Hardacre
comments:
  - GmSQE1 is a rate-limiting enzyme in steroid synthesis, which could mean
    GmSQE1 enhances soybean stress tolerance and the inhibition of SQE weakens
    this tolerance
  - Overexpression of GmSQE1 in soybean improved significantly soybean’s
    tolerance to oxidative stress while reducing oxidative stress-induced cell
    injury
  - Transcriptome and metabolome analyses shed light on the upregulation of
    multiple sterol compounds, including fucosterol and soyasaponin II, in
    GmNFYC9 and GmSQE1 overexpressing soybean plants under stress conditions
