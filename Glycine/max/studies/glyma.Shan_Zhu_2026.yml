comments:
  - While GmMYBA2 specializes in seed coat pigmentation and GmMYBA3 orchestrates
    floral coloration, GmMYBA1 emerges as the dominant regulator of
    light-responsive anthocyanin synthesis in hypocotyls/stems and young leaves.
  - GmSTF1/2 both activate GmMYBA1, with only GmSTF2 weakly inducing GmMYBA2 and
    neither affecting GmMYBA3.
  - GmMYBA1 interacts with bHLH cofactor GmTT8a and is hierarchically activated
    by the HY5 orthologs STF1/2 under light conditions
  - Ectopic overexpression of GmMYBA1 induces systemic pigmentation across
    leaves, stems, and reproductive organs, whereas RNAi-mediated silencing of
    GmMYBA1 significantly reduces anthocyanin accumulation in the hypocotyl.
phenotype_synopsis: GmMYBA1 correlates with photoprotective anthocyanin
  accumulation in hypocotyls/stems and young leaves in soybean
