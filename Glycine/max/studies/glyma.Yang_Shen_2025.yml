comments:
  - Downregulation of GmSCAMP4 impaired low phosphorus tolerance, root
    architecture, and phosphorus accumulation.
  - Overexpression of GmSCAMP4 can drive root remodeling to improve phosphorus
    acquisition efficiency, positively regulating deficiency adaptation.
  - GmSCAMP4 interacts with GmZFP2 and they collaboratively contribute to the
    response to low phosphorus stress.
  - Tissue expression analysis revealed GmSCAMP4 expression in all major organs,
    with predominant transcript accumulation in roots which are the principal
    site for phosphorus perception and assimilation.
phenotype_synopsis: Overexpression of GmSCAMP4 enhances the tolerance of
  soybeans to low phosphorus stress.
