scientific_name: Glycine max
gene_symbols:
  - GmAOC3
gene_symbol_long: Allene oxide cyclase encoding gene 3
gene_model_pub_name: Glyma.19G044900
gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.19G044900
confidence: 4
curators:
  - Molly Hardacre
comments:
  - GmAOC3-overexpressing transgenic soybean lines and the insertion of the
    GmAOC3 gene resulted in the silencing of GmCLO1
  - The GmAOC3-OE-1 soybean material, which overexpressed GmAOC3 and was
    accompanied by the suppression of GmCLO1, was more resistant to insects
  - Previous studies have demonstrated that GmAOC3 positively enhances tobacco
    resistance to common cutworm, and is one of the key enzymes in jasmonic acid
    biosynthesis
  - Common cutworm larvae that fed on the GmAOC3-overexpression line showed the
    lowest weight after five days of feeding compared with those that consumed
    the other three common cutworm-resistant lines GmAOC3-OE-11, GmAOC3-OE-29,
    and gmclo1-ko-2
  - In addition to its resistance to common cutworm, the GmAOC3-OE-1 line also
    exhibited resistance to fall armyworm, one of the most destructive pests
    affecting corn production in Asia and Africa
phenotype_synopsis: GmAOC3 over-expression increases soybean resistance to common cutworm
