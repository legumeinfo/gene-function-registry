comments:
  - When common cutworm larvae were fed GmCLO1 hairy roots, a decrease in weight
    gain compared with that of the larvae fed with the control hairy roots was
    observed, suggesting that GmCLO1 may negatively regulate soybean resistance
    to common cutworm
  - GmCLO1 may compete with GmAOS3 for the same substrate, 13-HPOT. The
    overexpression of GmCLO1 may reduce the flow of 13-HPOT to the AOS-mediated
    jasmonic acid pathway, resulting in a decrease in jasmonic acid synthesis
  - Phenotypic validation of the transgenic soybean plants further demonstrated
    that GmCLO1 and GmAOC3 played opposing roles in soybean insect resistance
