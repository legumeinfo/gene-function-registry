comments:
  - Homozygous GmTOC1b mutants exhibited increased tolerance to Soybean Mosiac
    Virus strain SC3 due to the activation of programmed cell death triggered by
    a hypersensitive response.
  - GmTOC1b binds to the promoter of GmWRKY40, which encodes a protein that
    activates the expression of salicylic acid-mediated defense-related genes.
  - The GmTOC1bH1 haplotype, which confers increased tolerance to Soybean Mosiac
    Virus, was artificially selected in improved cultivars from the Northern and
    Huang-Huai regions of China.
  - Results show that GmTOC1bH3 exhibited the strongest inhibitory activity on
    the GmWRKY40 promoter, whereas GmTOC1bH1 showed the weakest repressive
    effect.
phenotype_synopsis: GmTOC1b negatively regulates resistance to Soybean Mosaic Virus.
