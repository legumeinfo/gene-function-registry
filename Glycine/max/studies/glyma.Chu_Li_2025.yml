comments:
  - Gm18GRSC3 contains non-synonymous mutations that differentiate resistant and
    sensitive haplotypes, with certain allelic variations being linked to
    resistance phenotypes
  - Functional analyses demonstrated that overexpression of Gm18GRSC3
    significantly decreased Soybean mosaic virus strain SC3 accumulation, while
    silencing increased its levels, confirming its positive regulatory role in
    resistance
  - Gm18GRSC3 is a resistance gene in soybean located within the 8.47–8.89 Mb
    region on chromosome 18, associated with resistance to Soybean mosaic virus
    strain SC3 at both seedling and adult stages
  - A functional marker, FM18GSC3, was developed based on the allelic variation
    of Gm18GRSC3, enabling effective detection of resistance-associated alleles
    in soybean germplasm
phenotype_synopsis: Gm18GRSC3-positive soybean plants exhibit significantly
  reduced accumulation of Soybean mosaic virus strain SC3, leading to enhanced
  resistance of the virus at both seedling and adult stages
