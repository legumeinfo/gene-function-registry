phenotype_synopsis: GmbHLHm1 (paralog GmAMF1) is important to the soybean
  rhizobium symbiosis because loss of activity results in a reduction of nodule
  fitness and growth. Transcriptional changes in nodules highlight downstream
  signaling pathways involving circadian clock regulation, nutrient transport,
  hormone signaling, and cell wall modification. Four WGD-derived paralogs have
  similar nodule-enhanced expression patterns.
comments:
  - Established using mutation, expression, and related functional tests.
  - Originally named GmSAT1 (Symbiotic Ammonium Transporter 1) by Kaiser et al.,
    1998, but does not encode an NH4+ transporter.
  - Named GmbHLHm1 by Chiasson, Loughlin et al., 2014, but there are four
    paralogs in Glycine max, deriving from the legume and Glycine WGDs, and all
    four are predominantly nodule-expressed.
  - Also called GmAMF1 by Chiasson, Loughlin et al., 2014.
  - The four nodule-expressed paralogs in soybean are
    GmAMF1, glyma.Wm82.gnm4.ann1.Glyma.15G061400;
    GmAMF2, glyma.Wm82.gnm4.ann1.Glyma.13G253700;
    GmAMF3, glyma.Wm82.gnm4.ann1.Glyma.08G064500;
    GmAMF4, glyma.Wm82.gnm4.ann1.Glyma.07G184900
