phenotype_synopsis: GmAMF1;1 functions in ammonium transport, in the plasma membrane of
  soybean nodules. Its transcription is triggered by GmbHLHm1. Four WGD-derived
  paralogs have similar nodule-enhanced expression patterns.
comments:
  - The gene ID reported in Chiasson et al., 2014 was Glyma15g06660, but the ID in assembly 1
    appears to be instead Glyma15g06661
  - The four nodule-expressed paralogs in soybean are
    GmAMF1 or GmAMF1;1, glyma.Wm82.gnm4.ann1.Glyma.15G061400;
    GmAMF2 or GmAMF1;2, glyma.Wm82.gnm4.ann1.Glyma.13G253700;
