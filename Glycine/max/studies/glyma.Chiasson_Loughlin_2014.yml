phenotype_synopsis: Overexpression of GmbHLHm1 significantly increased nodule number and size,
  nitrogen fixation activity, and nitrogen delivery to the shoots. This contrasts with reduced
  nodule numbers per plant, nitrogen fixation activity and poor plant growth when silenced using RNAi
comments:
  - Established using mutation, expression, and related functional tests.
  - Originally named GmSAT1 (Symbiotic Ammonium Transporter 1) by Kaiser et al.,
    1998, but does not encode an NH4+ transporter.
  - Named GmbHLHm1 by Chiasson, Loughlin et al., 2014
  - GmbHLHm1 binds regulatory regions of four nodule-expressed ammonium facilitator protein paralogs,
    named AMF1 - AMF4 in Chiasson et al. 2014 and AMF1;1 - AMF1;4 in Hu, Wen et al., 2025
