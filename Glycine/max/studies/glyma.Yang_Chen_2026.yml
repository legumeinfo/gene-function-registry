comments:
  - GmEXLB1 improves the root development dependent-on auxin signal pathway,
    significantly increasing lateral root density and quantity
  - GmEXLB1 directly interacts with GmPUB21, an E3 ubiquitin ligase that
    negatively regulates soybean salt tolerance.
  - The stability of GmEXLB1 is regulated via the 26S proteasome pathway, and
    GmPUB21 promotes the degradation of GmEXLB1 specifically under salt stress.
