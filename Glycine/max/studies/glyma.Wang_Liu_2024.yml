scientific_name: Glycine max
gene_symbols:
  - GmLFY2
gene_symbol_long: Leafy 2
gene_model_pub_name: Glyma.06G163600
gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.06G163600
confidence: 5
curators:
  - Molly Hardacre
comments:
  - Analysis showed that soybean plants contain more copies of the LFY2
    transcript, with 1.2–4.7 times higher transcript levels than LFY1 in all
    organs examined suggesting that the different functions of soybean LFY1 and
    LFY2 may be associated with their transcript levels
  - The LFY1 LFY2 double mutants displayed more serious defects in floral organ
    development than LFY2, resulting in complete sterility
  - LFY1 and LFY2 were predominantly expressed in unopened flowers and the shoot
    apical meristem, however LFY2 had the higher transcript abundance
phenotype_synopsis: LFY2 mutants had floral meristems fail to produce normal
  floral organs and were instead replaced by clusters of leaf-like structures,
  causing severe sterility
