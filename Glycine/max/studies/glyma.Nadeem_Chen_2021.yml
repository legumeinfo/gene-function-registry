comments:
  - GmMs1 gene encodes a kinesin‐like protein in soybean, which displays high
    homology to Arabidopsis STD/TES/AtNACK2 and Nicotiana NACK2, and is the
    candidate gene controlling fertility.
  - In addition to regulating cell division, GmMs1 is associated with plant
    hormone signal transduction and sucrose metabolism.
  - The sterility of the GmMs1 mutant was due to the failure of normal
    cytoplasmic division at the end of the second meiosis. The result was
    formation of large, multinucleated microspores; a similar process occurs in
    the Arabidopsis tes mutant (which carries a mutation of AtNACK2).
phenotype_synopsis: GmMs1 knockout plants displayed a complete male-sterile
  phenotype in soybean, making GmMs1 essential for male plant sterility.
