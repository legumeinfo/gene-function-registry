comments:
  - GmYSL7 is a transporter that directs iron from root to nodule cells to
    meet the high demand of iron for the normal development and nitrogen
    fixation of root nodules.
  - In young nodules, GmYSL7 is upregulated to facilitate iron transport from
    roots to nodules. By increasing iron in nodule cells, it inhibits the
    transcriptional repression of GmbHLH300 (a factor required for iron response
    of nodules) on nodule development genes like ENOD93 and GmLbs, which in
    turn, promotes nodule development.
  - When iron is sufficient, bHLH300 is upregulated and functions as a feedback
    inhibitor to reduce GmYSL7 activity and iron uptake from roots to nodules.
  - GmYSL7 is localized in both the plasma membrane and the symbiotic membrane
    of plant cells.
  - Loss-of-function mutant GmYSL7 contained a reduced level of iron in nodules
    but increased iron in roots, while GmYSL7 overexpression showed the opposite
    effect on iron contents in roots and nodules.
  - GmYSL7 may be involved in nodule development and function through the
    regulation of both iron and oligopeptides.
phenotype_synopsis: GmYSL7 controls iron uptake and allocation, as well as
  outgrowth and development of nodules in soybean.
