  - GmbHLH300
gene_symbol_long: Basic Helix-Loop-Helix 300
gene_model_pub_name: Glyma.03G130600
gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.03G130600
confidence: 4
curators:
  - Molly Hardacre
comments:
  - Overexpression of GmbHLH300 decreases nodule number, nitrogenase activity,
    and iron content in nodules.
  - GmbHLH300 directly binds to the promoters of ENOD93 and GmLbs, which
    regulate nodule number and nitrogenase activity, and represses their
    transcription.
  - GmbHLH300 is induced by iron deficiency and mediates the plant response to
    iron deficiency in soybean plants.
  - GmbHLH300 might be involved in the transcriptional regulation of downstream
    iron deficiency-responsive genes that mediate nodule cell and bacteroid
    development.
phenotype_synopsis: GmbHLH300 negatively regulates nodule development in soybean
  and potentially regulates iron deficiency-responsive genes.
