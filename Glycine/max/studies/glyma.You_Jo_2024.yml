comments:
  - Five loci (I, T, W1, R and O) synergistically influence the deposition of
    flavonoids in the hilum - a remnant of the break in the funicle which
    transports nutrients into the seed from the pod (Yang et al. 2010). The
    flavonoid pathway regulates not only soybean seed colour but also influences
    nutritional and physiological traits.
  - The T gene governs seed coat color, pubescence color, and cold stress
    tolerance. Differences in chilling injury, antioxidant activity and types of
    flavonoids between the To7B and To7G NILs indicate F3'H affects soybean
    chilling tolerance by increasing antioxidant activity by producing more
    30,40-dihydroxylated flavonol derivatives (Toda, Takahashi et al., 2011).
  - Brown pubescence and brown hilums are associated with improved vitality and
    yield productivity under cold temperatures. (Zhou, Wang et al., 2024)
  - Toda (2002) isolated the gene sf3′h1 which corresponds to the T locus using
    rapid amplification of cDNA ends. The cDNA for sf3′h1 was 1690 nucleotides
    in length, encoded 513 amino acids, and showed 68% and 66% homology with
    corresponding F3′H proteins of Petunia × atkinsiana and Arabidopsis
    thaliana, respectively. A conserved amino acid sequence of F3′H proteins,
    GGEK, was expected for the sf3′h1 polypeptide.
  - The soybean F3′H1 gene (sf3′h1) encodes the enzyme flavonoid 3′-
    hydroxylase. The functional dominant T and the nonfunctional recessive t
    allele of sf3′h1 result in brown and gray pubescence, respectively (Toda,
    2002).
  - The sf3′h1 sequences from near-isogenic lines To7B (TT, brown) and To7G (tt,
    gray) differed by a single cytosine deletion in the To7G coding region. This
    shifted reading frame resulted in a truncated polypeptide missing the GGEK
    consensus sequence and the heme-binding domain.
  - The sf3′h1 was mapped using restriction fragment length polymorphisms at the
    same position with the T locus on Linkage Group 3(c2). PCR-RFLP bands
    co-segregated with alleles at the T locus in an F2 population segregating
    for the T locus. The gray pubescence cultivars analyzed using PCR-RFLP
    revealed longer fragments than the brown pubescence cultivars as a result of
    the gene's single-base deletion (Toda, 2002).
  - Thus sf3′h1 is the same as the T gene of soybean responsible for pubescence
    color and the single-base deletion was probably responsible for gray
    pubescence color (Toda, 2002).
  - The pleiotropic T loci that control soybean pubescence and hilum colors, or
    other closely-linked loci, also impact plant development, stem growth
    habits, seed yield, leaf shape, and cold tolerance. (Toda, 2002)
  - The complete sf3'h1 protein was detected most strongly in the hilum and
    funiculus of the immature seed coat by Western-blot analysis in To7B
    (homozygous dominant) plants. The sf3'h1 protein extracted from To7G
    (homozygous recessive) plants was truncated and harder to detect. F3'H
    enzyme activity was detected using microsomal fractions from yeast
    transformed with sf3'h1 coming from To7B (homozygous dominant), but not
    derived from To7G (homozygous recessive). Scavenging activity of the
    1,1-diphenyl-2-picrylhydrazyl (DPPH) radical in funiculus and hilum extracts
    was higher in homozygous dominant than in recessive plants. Therefore, F3'H
    is likely connected to flavonoid biosynthesis in the testa and the
    antioxidant properties manifested therein (Toda, 2012).
  - Immunofluorescence microscopy mainly found the flavonoid 3 -hydroxylase
    protein within the parenchymatic cells of the seed coat hilum surrounding
    the vacuole. Immunoelectron microscopy with gold particles narrowed
    cytochrome P450 monooxygenase F3'H's location to the tonoplast in soybean
    vacuoles (Toda, 2012).
  - A Genome-Wide Association Study characterized candidate genes governing stem
    pubescence color and hilum color in 264 accessions of soybeans. Twelve and
    seven significant lead SNPs were associated with the stem pubescence color
    and hilum color traits, respectively. Within the vicinity of these markers
    (120 kb upstream and downstream), seven candidate genes (stem pubescence
    color) and four candidates (hilum color) were proposed based on
    transcription patterns, cold stress responses, and regulatory pathways.
    Arabidopsis AT5G07990 that encodes a flavonoid 3′-hydroxylase, is one
    candidate gene linked to both stem pubescence and seed hilum colors. This
    gene was highly expressed primarily in the seeds, secondarily in pods, and
    also in stems and the shoot apical meristem. The sf3′h1 is situated at 18.73
    Mb on chromosome 6, nearby two SNPs (Chr06:18749716 and Chr06:18749528)
    associated with colors of stem pubescence and hilums (Zhou, Wang et al.,
    2024).
  - Canopy leaf pigmentation changes (CLPC), manifested as unusual
    reddish-purple pigmentation, was observed in upper canopy leaves of soybean
    during late reproductive stages. The CLPC phenotype may be an adaptation to
    an undefined abiotic stress. (You, Jo et al., 2024)
  - Pigmented leaves showed signs of stress such as decreased Fv/Fm numbers for
    photosystem II and hyperspectral reflectance. These findings may indicate
    enhanced accumulation of flavonoids or related secondary metabolites. (You,
    Jo et al., 2024) - Reflectance wavelengths in the peak reflectance range for
    anthocyanins (520–550 nm range) differed between reddish-purple and green
    leaves. Normally this result would point to accumulation of anthocyanins in
    the pigmented leaves. Nevertheless, anthocyanin wasn't found in either
    pigmented or non-pigmented leaf samples by using ultrahigh-performance
    liquid chromatography. (You, Jo et al., 2024)
  - A significant major QTL on chromosome 6, placed between 17.9 and 18.9 Mbp,
    explained 62.8% of phenotypic variance (peak LOD = 36.5) and is the first
    such QTL known in soybean. (You, Jo et al., 2024)
  - Glyma.06G202300 gene expression was 2.5- to 7.2-fold higher in pigmented
    canopy leaves of sensitive RILs when compared to their non-pigmented lower
    leaves. There was no equivalent difference in transcription perceived in the
    insensitive parent-of-RILS Daepung. (You, Jo et al., 2024)
  - Candidate gene Glyma.06G202300 encodes a Flavonoid 3′-Hydroxylase (F3′H)
    that is important for biosynthesis of anthocyanin pigments. (You, Jo et al.,
    2024)
  - Purple-leaved plants (including sensitive parents Uram and PI96983) have a
    mutation in Glyma.06G202300 that results in the atypical color and
    environmental response; a single-base deletion localized to 18,737,369 BP in
    the third exon. The consequence of this frameshift mutation is a premature
    stop codon and is expressed as a truncated protein missing domains needed
    for functionality. (You, Jo et al., 2024)
  - Qihuang 34 (black hilum) was crossed with an unknown edamame variety (brown
    hilum) to create a population segregating with a 3:1 ratio of black hilum to
    brown hilum. It seems a single dominant gene controls hilum colour in this
    population (Liu, Wang et al., 2025). The locus was mapped to an 1020-kb
    interval on chromosome 6 and named Hilum Colour 1 (HC1). Discovery of
    informative recombinants in the population reduced the region to 34-kb near
    HC1 in which only one open reading frame was found, the Glyma.06G202300.
  - Sequencing of Glyma.06G202300 revealed a single-base deletion in exon 3
    present for the brown-hilum soybean, which resulted in a frameshift mutation
    with premature termination and deletion of the functional domain (Liu, Wang
    et al., 2025).
  - HC1, an orthologue of Arabidopsis TT7, encodes for flavonoid 3′-hydroxylase
    (F3′H). F3′H converts apigenin or kaempferol substrates to luteolin and
    quercetin, respectively. HC1 is localized to the endoplasmic reticulum and
    may be involved in flavonoid biosynthesis there. HC1 is constitutively
    expressed in soybean and to a particularly high degree in early‑ to
    mid‑developing seeds (Liu, Wang et al., 2025).
  - They knocked out HC1 in the Wm82 background to validate the HC1 candidate
    gene. Knockout of HC1 results in lighter seed hilum colour than in wild type
    and suppressed the downstream production of dihydroquercetin and quercetin.
    Overexpression alters hilum colour and increases HC1 transcript levels,
    indicating HC1 affects hilum colour and size (Liu, Wang et al., 2025).
  - HC1 haplotypes were categorized into three groups, with truncated
    nonfunctional variants absent in wild soybeans but prevalent in cultivars,
    especially in northern China, suggesting domestication selection (Liu, Wang
    et al., 2025).
  - Black-hilum soybean lines associate with larger hilum size and higher oil
    content; knockout of HC1 reduces hilum size and seed oil content whereas HC1
    overexpression increases oil content without affecting yield or fatty acid
    composition (Liu, Wang et al., 2025).
  - HC1 positively affects nodulation, chlorophyll content, and photosynthetic
    efficiency, enhancing nodulation with certain Bradyrhizobium strains,
    implying a role in symbiotic nitrogen fixation (Liu, Wang et al., 2025).
  - HC1 likely enhances antioxidant activity in the hilum, improving nutrient
    transport and seed oil accumulation; RNA sequencing identified HC1-mediated
    expression changes suggesting pathways for flavonoid-regulated oil
    accumulation (Liu, Wang et al., 2025).
  - The pleiotropic effects of HC1 include regulation of hilum development, seed
    oil content, and nodulation, providing new insights for soybean
    domestication and breeding strategies focused on quality and symbiotic
    performance (Liu, Wang et al., 2025).
phenotype_synopsis: Glyma.06G202300 encodes a Flavonoid 3′-Hydroxylase (F3′H)
  and is associated with canopy leaf pigmentation and abiotic stress resistance.
