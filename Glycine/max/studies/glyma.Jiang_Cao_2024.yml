comments:
  - GmCrRLK1L members exhibited high homology with Arabidopsis genes such as
    ANX1 (AT3G04690), ANX2 (AT5G28680), FER, and THE1.
  - GmCrRLK1L2 knockout plants showed no difference in salt tolerance compared
    to WT; however, GmCrRLK1L2-overexpression plants exhibited decreased salt
    tolerance compared to WT plants.
  - GmCrRLK1L2 overexpression influenced the expression of metabolic pathways
    and salt stress-responsive genes, including ACS3, ACO1, PER64, PER53, SAT3,
    and BCAT2.
  - Overexpression of GmCrRLK1L2 in soybean resulted in reduced plant height.
  - Gene structure and motif analysis revealed a predominance of intron-lacking
    and relatively conserved GmCrRLK1L genes. With conserved motif patterns
    across members, CrRLK1L genes in soybean appear to have conserved functions
    in responding to salt stress, similar to other plant species.
phenotype_synopsis: GmCrRLK1L2 may decrease soybean tolerance to salt stress as
  well as diminishing plant height.
