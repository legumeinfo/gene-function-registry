scientific_name: Glycine max
gene_symbols:
  - GmMYBR1
gene_symbol_long: MYB repressor 1
gene_model_pub_name: Glyma.02G247100
gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.02G247100
confidence: 4
curators:
  - Molly Hardacre
comments:
  - GmMYBR1 acts as a transcriptional repressor that inhibits anthocyanin
    accumulation, resulting in pale flower pigmentation when overexpressed
  - GmMYBR1 does not directly recognize target promoters but acts through
    interaction with the GmMYBA3-GmTT8a complex to exert its repressive effects
  - Fusion of a strong activation domain (VP16) to GmMYBR1 does not convert it
    into an activator, suggesting the dominance of its repression domains
  - GmMYBR1 and GmMYBA3 form part of an antagonistic regulatory complex bridged
    by the bHLH factor GmTT8a, which modulates floral anthocyanin biosynthesis
  - Despite its repressive role, GmMYBR1 is highly expressed in soybean flowers
    across diverse cultivars, implying it plays a major role in fine-tuning
    anthocyanin biosynthesis
phenotype_synopsis: GmMYBR1 overexpression results in reduced anthocyanin
  accumulation and fading of flower color and hypocotyl pigmentation in soybean.
traits:
  - entity_name: flower color
    entity: TO:0000537
  - entity_name: negative regulation of anthocyanin biosynthetic process
    entity: GO:0031541
references:
