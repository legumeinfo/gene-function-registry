comments:
  - GmMYBA3 functions as a positive transcriptional activator that promotes
    anthocyanin biosynthesis in soybean flowers, leading to intensified
    pigmentation
  - Subcellular localization assays confirm that GmMYBA3 is localized in the
    nucleus, consistent with its role as a transcriptional regulator
  - Overexpression of GmMYBA3 in soybean leads to intense purple pigmentation
    not only in flowers but also in pods, leaves, and seed coats, indicating its
    potent activation effect
  - GmMYBA3 directly binds to promoters of anthocyanin biosynthesis-related
    genes including GmF3'5'H, GmDFR2, GmMYBR1, and GmTT8a, thereby activating
    their expression
  - GmMYBA3 and GmMYBR1 exhibit major expression levels across diverse soybean
    cultivars, indicating their central role in regulating anthocyanin genes,
    although flower color variation mainly depends on GmF3'5'H sequence variants
phenotype_synopsis: GmMYBA3 overexpression causes intense purple pigmentation in
  soybean flowers and other organs, while its silencing leads to loss of flower
  color.
