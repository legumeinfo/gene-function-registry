comments:
  - GmOFP8 shows root-enriched expression and is strongly upregulated by
    brassinolide (BL) treatment and drought stress conditions
  - GmOFP8 overexpression lines demonstrate enhanced drought survival (~70%
    survival rate) compared to knockout mutants (~20%) and wild-type plants
    (~33%)
  - GmOFP8 physically interacts with GmSK2, a GSK3-like kinase that negatively
    regulates the same processes, creating a regulatory balance. It is plausible that GmSK2 modulates GmOFP8 through phosphorylation, thereby influencing its activity or protein stability.
  - GmOFP8 promotes nodule formation under both normal and drought-stressed
    conditions, with overexpressing lines developing significantly more nodules
    than wild-type plants
phenotype_synopsis: GmOFP8 overexpression enhances soybean drought tolerance by
  improving survival rates and promoting increased nodule formation under both
  normal and drought conditions.
