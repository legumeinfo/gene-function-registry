---
scientific_name: Glycine max
gene_symbols:
  - GmSK2
gene_symbol_long: Glycogen Synthase Kinase 3-like Kinase 2
gene_model_pub_name: Glyma.12G129600
gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.12G129600
confidence: 4
curators:
  - Molly Hardacre
comments:
  - GmSK2 physically interacts with GmOFP8 as confirmed through yeast
    two-hybrid, luciferase complementation, and GST pull-down assays.
  - GmSK2 facilitates nucleocytoplasmic translocation of GmOFP8, promoting its
    nuclear export from exclusive nuclear localization to cytoplasmic
    redistribution.
  - GmSK2 negatively affects nodulation development, as overexpressing lines
    developed significantly fewer nodules compared to controls.
  - GmSK2 overexpression suppresses drought-responsive genes (GmRD26, GmDREB1,
    GmMYB14) and antioxidant enzyme genes, compromising stress resilience.
phenotype_synopsis: GmSK2 negatively regulates drought tolerance, with
  overexpression lines showing severe leaf wilting, lower water content, and
  increased oxidative stress markers.
traits:
  - entity_name: drought tolerance
    entity: TO:0000276
  - entity_name: root nodule number
