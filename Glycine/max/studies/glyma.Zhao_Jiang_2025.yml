comments:
  - GmPAP14 overexpression results in improved plant growth, higher seed oil
    content, and enhanced photosynthetic efficiency under phosphorus-deficient
    conditions
  - GmPAP14 is significantly upregulated in soybean roots and leaves under
    organic phosphorus conditions, indicating its role in organic phosphorus
    utilization
  - Overexpression of GmPAP14 enhances both extracellular and intracellular acid
    inorganic phosphatase activities, leading to increased phosphorus content in
    soybean tissues under organic phosphorus stress
  - Overexpression of GmPAP14 in soybean enhances external phytate hydrolysis,
    increases phosphorus content, and promotes plant growth under low phosphorus
    conditions
  - GmPAP14 exhibits high phytase activity, enabling it to hydrolyze phytate and
    release inorganic phosphate for plant absorption
  - GmPAP14 is a soybean purple acid phosphatase primarily expressed in roots,
    strongly induced under organic phosphorus conditions, particularly phytate,
    to facilitate phosphorus utilization
phenotype_synopsis: Overexpression of GmPAP14 enhances soybean growth, seed oil,
  photosynthetic efficiency, phytate utilization, phosphorus uptake in root
  systems and other plant tissues under phosphorus deficiency
