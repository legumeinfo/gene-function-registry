confidence: 5
curators:
  - Scott Kalberer
comments:
  - Locus Rsv3 confers strain-specific resistance to soybean mosaic virus (SMV)
    and was mapped on chromosome 14 in soybean genotype L29. Five NBS-LRR
    candidate genes were identified between two genetic markers.
  - Glyma.14G204700 in assemblies 2 and 4 is the same as Glyma14g38533 in
    assembly 1.
  - Isolated and confirmed a locus, Glyma.14G204700, as full-length cDNA from
    soybean variety L29 that provides targeted resistance against SMV.
  - Overexpressing Glyma.14G204700 in susceptible soybeans inhibited SMV
    infection.
  - Transient silencing of Glyma.14G204700 in resistant L29 plants increased
    accumulation of the virus.
phenotype_synopsis: Glyma.14g204700 is a strong candidate for the Rsv3 gene
  responsible for strain-specific SMV resistance in soybean.
