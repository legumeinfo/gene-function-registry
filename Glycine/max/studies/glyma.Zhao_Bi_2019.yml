comments:
  - The gene model full id I pieced together from Information I found so it is probably wrong. (Williams 82, Glycine_Max_v4.0)
  - soybean genome contains more DGAT genes -> duplicaiton events
  - Overexpression of DGAT2D enhances triacylglycerol biosynthesis in flower tissues.
  - DGAT2D is upregulated by temperature stress but downregulated by insect bites and jasmonate.
  - DGAT2D produces similar results when transformed into other species.
phenotype_synopsis: DGAT2D controls synthesis of many triacylglycerols, using 18:1 and 18:2 acyl CoA as acyl donors. Oil accumulates most in flowers.
