comments:
  - GmAP1 is a multifunctional protein involved in both flowering time
    regulation and salt stress responses, as GmAP1 expression was strongly
    induced by salt stress.
  - GmAP1 is targeted to chloroplasts, where it downregulates the PHD-type
    transcription factor gene PTM without affecting GOLDEN2-LIKE 1/2 (GLK1/2).
    GmAP1 seems to regulate flowering time primarily through the PTM-dependent 
    rather than the GLK-dependent signaling pathway.
  - GmAP1 interacts with and degrades the Rubisco large subunit (rbcL), a
    process correlating with decreased photosynthetic rate and delayed
    flowering in overexpression lines under salt stress.
phenotype_synopsis: Overexpressing GmAP1 leads to delayed flowering time in
  soybean and enhances sensitivity to salt stress.
