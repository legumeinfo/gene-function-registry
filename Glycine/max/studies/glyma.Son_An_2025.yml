comments:
  - GmMPK6 positively regulates the expression of GmRD19A (RESPONSIVE TO
    DEHYDRATION 19A) under drought stress conditions
  - GmMPK6's activation is mediated by calcium signaling pathways, as calcium
    channel inhibitors reduce its kinase activity
  - Inhibition of GmMPK6 activity using SB202190 leads to reduced drought
    resistance, decreased chlorophyll content, and increased membrane damage
  - GmMPK6 is activated by multiple stress conditions including abscisic acid,
    osmotic stress (mannitol), salt stress, and drought conditions
phenotype_synopsis: GmMPK6 is a mitogen-activated protein kinase that enhances
