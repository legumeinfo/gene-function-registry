scientific_name: Glyecine Max
gene_symbols: 
  - GmSOC1-like
gene_symbol_long: Supressor of overexpression CO1/Agamous-like 20
gene_model_pub_name: Glyma09g40230.1
gene_model_full_id: 
confidence: 4 
curators: 
  - Molly Hardacre
comments:
  - GmSOC1-like is an inducer which may participate in the initiation and maintenance of flowering in soybean
  - GmSOC1-like was induced 4 days earlier than GmSOC1 during flowering transition in SD, suggesting that GmSOC1 and GmSOC1-like expression might be differentially regulated
  - GmSOC1-like was widely expressed at different levels in most organs of the soybean, with the highest expression in the shoot apex during the early stage of floral transition
  - GmSOC1-like expression showed a circadian rhythm pattern, with the highest expression at midnight under short-day (SD) condition
