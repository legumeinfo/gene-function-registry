comments:
  - GmMYB84 enhances lignin/flavonoid synthesis and improved reactive oxygen
    species detoxification
  - GmMYB84 acts as a master regulator that activates the phenylpropanoid
    pathway to synthesize protective flavonoids and phenolic compounds
  - GmMYB84 preserves plant vigor during cadmium exposure. While wild-type
    soybean leaf dry weight decreased by 22.1% under stress, knockout mutants
    suffered a 51.3% reduction
  - GmMYB84 strengthens cellular defenses by regulating cell wall-related
    processes by activating chitinase expression, which is associated with cell
    wall remodeling and pathogen defense
