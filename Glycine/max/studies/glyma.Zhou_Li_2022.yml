gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.10G018800
confidence: 3
curators:
  - Molly Hardacre
comments:
  - Nitrogen starvation only led to significant decreases of transcripts for
    GmNLA1-1 and GmNLA1-3 in soybean roots under phosphate-sufficient
    conditions, not for GmNLA1-2
  - GmNLA1-2 might differ from GmNLA1-1 and GmNLA1-3 in soybean response to
    interaction of nitrogen and phosphorus availability despite their capability
    controlling phosphorus homeostasis.
  - Suppression of all three GmNLA1 members was able to increase phosphate
    concentration regardless of the phosphorus and nitrogen availability in the
    growth medium, but decrease fresh weight under normal conditions in soybean
    hairy roots
  - GmNLA1-2 was only detected in the plasma membrane
  - GmNLA1-1, GmNLA1-2 or GmNLA1-3 suppression increased phosphate concentration
    in transgenic hairy roots
phenotype_synopsis: GmNLA1-2 supression may increase phosphate concentration in
  transgenic hairy roots, as well as potentially decrease fresh weight in
  soybean hairy roots
