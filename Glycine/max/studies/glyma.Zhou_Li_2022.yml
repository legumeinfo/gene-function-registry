comments:
  - GmNLA1-1 and GmNLA1-3 expression was decreased in soybean by nitrogen
    starvation under phosphate sufficient conditions
  - Suppression of all three GmNLA1 members was able to increase phosphate
    concentration regardless of the phosphorus and nitrogen availability in the
    growth medium, but decrease fresh weight under normal conditions in soybean
    hairy roots
  - GFP-GmNLA1-1 and GFP-GmNLA1-3 were detected in both the plasma membrane and
    nucleus
  - GmNLA1-1, GmNLA1-2 or GmNLA1-3 suppression increased phosphate concentration
    in transgenic hairy roots
phenotype_synopsis: GmNLA1-1 or GmNLA1-3 might regulate phosphorus homeostasis
  in soybean response to nitrogen starvation, as well as potentially decrease
  fresh weight in soybean hairy roots
