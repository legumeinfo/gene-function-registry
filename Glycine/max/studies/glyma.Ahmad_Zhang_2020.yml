comments:
  - GmMaT2 and GmMaT4 can synthesize malonyl isoflavone glucosides both in vitro
    and in vivo.
  - GmMaT4 is expressed in all tissues but at higher levels in seed coat than in
    the cotyledon, and at >10-fold higher levels in black and brown seed coats
    than in yellow seed coats.
  - Overexpression in hairy roots of GmMaT2 and GmMaT4 produced more
    malonyldaidzin, malonylgenistin, and malonylglycitin, and resulted in more
    nodules than control.
