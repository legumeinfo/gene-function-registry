gene_model_full_id: glyma.Wm82.gnm4.ann1.Glyma.18G258000
confidence: 5
curators:
  - Molly Hardacre
comments:
  - Ectopic expression of GmMaT2 and GmMaT4 produced more isoflavones in hairy
    root exudates, promoting the development of more nodules in soybean roots
    than in the control.
  - GmMaT2 and GmMaT4 enzymes convert daidzin into malonyldaidzin, glycitin into
    malonylglycitin, and genistin into malonylgenistin.
  - Only GmMaT2 knockdown hairy roots showed reduced levels of malonyldaidzin,
    malonylgenistin, and malonylglycitin, and, likewise, reduced nodule numbers.
  - GmMaT2 had higher activity towards isoflavone glucosides than GmMaT4.
  - GmMaT2 was highly expressed in seeds, root hairs, and nodules.
phenotype_synopsis: GmMaT2 and GmMaT4 mediate isoflavone malonylation, promoting
  the development of more nodules in soybean roots.
