comments:
  - GmBIM1 is a bHLH transcription factor that operates within the
    brassinosteroid (BR) signaling pathway. It's homologous to Arabidopsis BIM1,
    which cooperates with BES1 to bind E-box sequences and regulate
    BR-responsive genes.
  - GmBIM1 controls plant height by regulating cell size rather than cell
    number. Knockout mutants (cr−BIM1−1) showed significantly larger internode
    cells, while overexpression lines displayed smaller internode cells compared
    to wild-type plants.
  - Analysis revealed that GmBIM1 localizes to the nucleus, and shows the
    highest expression levels detected in developing stems and leaf buds.
  - GmBIM1Hap3 (dwarf haplotype) provides superior lodging resistance suitable
    for high-density cultivation, while GmBIM1Hap4 (tall haplotype) maximizes
    per-plant yield potential in low-density systems. This enables
    marker-assisted selection for tailored plant architecture.
phenotype_synopsis: GmBIM1 functions as a negative regulator of plant height in soybean.
