comments:
  - Silencing GmERF57 expression promoted root development (total root length,
    root surface area, root volume, branch number, shoot dry weight, root dry
    weight) and enhanced plant soil phosphate uptake.
  - Overexpression of GmERF57 yielded contrasting phenotypes compared to
    silenced roots.
  - GmERF57 physically interacts with GmTUB1 (β-tubulin protein) and modulates
    soybean root architecture and soil phosphate uptake capacity by
    downregulating GmTUB1 and other phosphate starvation response genes.
  - Population genomics analysis revealed that GmERF57 has undergone artificial
    selection, and allelic distribution analysis significantly correlated with
    traits associated with low phosphate tolerance in soybean.
  - Haplotype 2 (Hap2), carrying the T to C single nucleotide polymorphism (SNP)
    in GmERF57, is an allele linked to low-phosphate tolerance.
phenotype_synopsis: GmERF57 negatively impacts soybean root structure and its
  expression in roots was induced by low phosphate.
