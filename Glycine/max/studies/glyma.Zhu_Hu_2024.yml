comments:
  - Overexpression of GmTUB1 promotes the growth of soybean hairy roots, thereby
    enhancing their phosphate acquisition capability and increasing root
    phosphate content.
  - Silencing of GmTUB1 inhibited the root growth, but the difference between
    checks and Ri-GmTUB1 plants was not significant.
  - Regardless of phosphate supply, GmTUB1 was significantly upregulated in
    Ri-GmERF57 (RNA interference-mediated silencing plant) roots compared with
    checks, while no significant change was observed in OE-GmERF57
    (overexpressing plant) roots.
  - Most of the fusion protein of GmTUB1 was found in nucleus and cell membrane.
phenotype_synopsis: GmERF57 interacts with GmTUB1, which enhances root growth and phosphate uptake.
