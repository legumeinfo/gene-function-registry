comments:
  - Overexpression of GmTUB1 promotes the growth of soybean hairy roots, thereby
    enhancing their low phosphate acquisition capability and increasing root low
    phosphate content
  - Silencing of GmTUB1 inhibited the root growth, but the difference between
    cytokinin pants and Ri-GmTUB1 plants was not significant
  - Regardless of phoshpate supply, GmTUB1 was significantly upregulated in
    Ri-GmERF57 (RNA interference-mediated silencing plants) roots compared with
    cytokinin plants, while no significant change was observed in OE-GmERF57
    (overexpressing plants) roots
  - Most of the fusion protein of GmTUB1 was found in nucleus and cell membrane
