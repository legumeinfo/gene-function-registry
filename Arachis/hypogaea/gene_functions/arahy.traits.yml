confidence: 3
curators:
  - Scott Kalberer
comments:
  - Resequenced 390 peanut accessions found worldwide, including 261 from
      northern and southern China, to evaluate genome-wide diversity of
      landraces and breeding lines. Sequencing data were aligned to the Arachis
      hypogaea cv. Fuhuasheng reference genome and then 8,803,668
      single-nucleotide polymorphisms (SNPs) were identified along with
      2,137,963 insertions and deletions (InDels). GWAS was conducted over 4
      seasons in Guangzhou, China, leading to 28 agronomic traits being
      discovered with 22,309 associations with loci.
  - AhANT, located on the end of chromosome B06, was associated with the seed
      and pod weight and seed and pod size traits. GWAS analysis found that
      five SNPs on B06 associated with pod size were located in a linkage
      disequilibrium block between 147,693,870 and 148,580,715 base pairs (BP).
      This region overlapped two genetic variations associated with seed weight
      and pod weight identified by Gangurde, Wang et al., (2020).
  - AhANT in peanut is homologous to ANT (At4g37750) in Arabidopsis thaliana.
      This ethylene-responsive transcription factor gene regulates the
      hormone-signaling pathway controlling size and cellular division in
      organs of Arabidopsis such as seeds, as well as the ABA-signal-mediated
      drought resistance of seeds.
  - AhANT protein structure includes two YRG elements and one RAYD element that
      are important conserved sections of the AP2 (APETALA2) domain.
  - A nonsynonymous SNP (C/A) resulted in a shift from the amino acid proline
      to threonine. Consequentially, the pod- and seed-related trait values
      were substantially higher for plants with the CC genotype than the AA
      genotype.
  - The publication provided the candidate gene name of Ahy_B06G085890;
      however, there was no associated sequence except for a non-downloadable
      one in Supplementary figure 14. The homologous Arabidopsis sequence
      At4G37750 was used to locate a potential region on Arachis hypogaea cv.
      Fuhuasheng identified as arahy.Fuhuasheng.gnm1.chr16 CM014330.1 in
      GenBank. A BLAST of At4G37750 on the Tifrunner.gnm2.J5K5 genome located
      Ah16g512200 in arahy.Tifrunner.gnm2.chr16:147,880,368..147,885,613.
phenotype_synopsis: The transcription factor AhANT is affiliated with weights
  and dimensions of seeds and pods in peanut, with trait values impacted by
  changes in protein sequence.
