    entity: TO:0000190
  - entity_name: anthocyanin content
    entity: TO:0000071
  - entity_name: anthocyanidin reductase activity
    entity: GO:0033729
  - entity_name: proanthocyanidin biosynthetic process
    entity: GO:0010023
