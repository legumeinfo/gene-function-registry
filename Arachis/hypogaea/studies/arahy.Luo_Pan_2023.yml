comments:
  - Aluminum treatments of growing peanut seedlings result in significant
    binding of Aluminum in the plant root tip.
  - Highest sequence identity of 83.1% identity with Aradidopsis xth32 protein
    sequence.
  - The expression of AhXTH32 was negatively associated with Aluminum tolerance,
    with modulation of the XET/XEH ratio, alterations to the Aluminum inhibition
    of root growth, inducing the occurrence of programmed cell death, and
    negatively affecting Aluminum tolerance.
  - Aluminum-tolerant peanut cultivar root-tip cell walls bind Aluminum
    predominantly in the HC1 fraction, which results in the inhibition of
    AhXTH32.
phenotype_synopsis: Expression of AhXTH32 inhibits root growth and induces
  aluminum programmed cell death.
