comments:
  - AhGSNOR1 reduces aluminum‑induced programmed cell death in transgenic
    tobacco by enhancing superoxide dismutase, peroxidase and catalase
    activities.
  - In tobacco, AhGSNOR1 reduced the extent of lipid peroxidation and nitric
    oxide, S-Nitrosothiol and H2O2 levels, and maintaining intracellular nitric
    oxide and redox levels.
  - AhGSNOR1 directly interacted with AhTRXh (Cytosolic thioredoxin h, shown in
    yeast and rice protoplasts) in vivo, and AhGSNOR1 positively
    regulated/increased Trxh3 expression in transgenic tobacco.
  - AhGSNOR1 was most closely related to the GSNOR proteins of Prunus persica,
    Cucumis sativus and Arabidopsis thaliana.
  - AhGSNOR1 gene expression increases under aluminum stress in Arachis
    hypogaea, with RT‑qPCR analysis showing AhGSNOR1 transcript levels rising
    after 8, 12, and 24 hours of aluminum exposure. Western blot confirmed
    AhGSNOR1 protein levels also increase.
phenotype_synopsis: AhGSNOR1 improved plant resistance to aluminum stress and
  negatively regulated the occurrence of aluminum-induced programmed cell death.
