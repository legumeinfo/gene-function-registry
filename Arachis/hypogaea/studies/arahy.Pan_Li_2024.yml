comments:
  - The AhGSNOR1 negatively regulated aluminum-induced programmed cell death by
    enhancing superoxide dismutase, peroxidase and catalase activities.
  - AhGSNOR1 reduced the extent of lipid peroxidation and nitric oxide,
    S-Nitrosothiol and H2O2 levels, and maintaining intracellular nitric oxide
    and redox levels.
  - AhGSNOR1 directly interacted with AhTRXh (Cytosolic thioredoxin h) in vivo,
    and AhGSNOR1 positively regulated the transcriptional level of Trxh3.
  - AhGSNOR1 was most closely related to the GSNOR proteins of Prunus persica,
    Cucumis sativus and Arabidopsis thaliana.
phenotype_synopsis: AhGSNOR1 improved plant resistance to aluminum stress and
  negatively regulated the occurrence of aluminum-induced programmed cell death
