comments:
  - Overexpression of AhCML69 in tobacco leaves increased resistance to
    Ralstonia solanacearum infection and induced the expression of
    defense-related genes, suggesting that AhCML69 is a positive regulator of
    disease resistance.
  - Expression analysis revealed that AhCML69 was constitutively expressed in
    the roots, stems, leaves, and flowers of peanut plants and was involved in
    the response to Ralstonia solanacearum infection.
  - The AhCML69 protein was localized in the cytoplasm and nucleus.
  - AhCML69 is a positive regulator of PAMP-triggered immunity by mediating the
    jasmonic acid and salicylic acid pathways.
