comments:
  - AhSUT4 is predominantly expressed in peanut root tips and flowers,
    indicating a role in tissue-specific sucrose transport
  - Overexpression of AhSUT4 in Arabidopsis increases soluble sugars and alters
    plant architecture, such as promoting branching and reducing silique length
  - AhSUT4 responds to salt stress, with increased expression under saline
    conditions, indicating a role in stress adaptation alongside sucrose
    transport
  - AhSUT4 localizes mainly to the plasma membrane and vesicles, suggesting
    functions in transmembrane sugar uptake and cellular trafficking
  - AhSUT4 expression is higher during pod and kernel development in high-sugar
    peanut varieties, implying a contribution to seed sugar accumulation
phenotype_synopsis: AhSUT4 plays a role in sugar transport and developmental
  regulation. Overexpression of AhSUT4 in Arabidopsis results in increased sugar
  content and altered growth patterns, including enhanced branching and
  shortened siliques
