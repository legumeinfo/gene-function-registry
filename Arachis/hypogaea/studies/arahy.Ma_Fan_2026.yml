comments:
  - AhZAR1-4 is a leucine-rich repeat receptor-like kinase that plays an
    essential role in early seed development in peanut.
  - The gene contains a C-to-T mutation at position 907 bp in the mutant,
    resulting in a premature stop codon and loss of transmembrane and kinase
    domains.
  - AhZAR1-4 interacts with AhIAA31 in the auxin signaling pathway and responds
    to brassinosteroid and indole-3-acetic acid treatments, indicating its role
    in hormone regulation.
  - The mutation disrupts the SSP-YODA-MPKK4/5-MAPK3/6-WRKY2 signaling pathway,
    leading to downregulation of downstream genes like AhYDA and AhWOX8.
  - Heterologous overexpression of AhZAR1-4 wild-type alleles successfully
    rescued the seed-abortion phenotype of the Arabidopsis thaliana atzar1-4
    mutant and increased seed size, whereas AhZAR1-4 mutant allele expression
    did not.
phenotype_synopsis: The AhZAR1-4 mutant lacks transmembrane and kinase
  domains due to a premature stop codon, loses membrane localization, and when
  overexpressed in wild-type form increases seed size while the mutant form
  fails to complement seed abortion defects.
