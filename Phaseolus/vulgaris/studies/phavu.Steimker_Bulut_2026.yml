comments:
  - Members of the OFP group are known to interact with TONNEAU1 RECRUITMENT
    MOTIF (TRM) proteins, thereby modulating cell division and potenitally organ
    development
  - Heterologous research was done by overexpressing the inferior (Mesoamerican)
    and superior (Andean) alleles of PvOFP5 from Phaseolus vulgaris in
    Arabidopsis thaliana wild-type and knockout lines, and confirmed the key
    role of PvOFP5 in determining seed area
  - Across all parameters, OFP5-2 (superior allele) consistently produced larger
    seeds than OFP5-1 (inferior allele). The inferior allele complemented the
    seed area and length phenotype in the knockout background but led to reduced
    seed size when overexpressed in wild types
phenotype_synopsis: PvOFP5 is a major gene that regulate seed size in common bean
